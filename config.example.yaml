oghma:
  force: false

oghma_projects:
  # Windows OneDrive path; WSL mount (/mnt/c/...) is derived automatically
  source_dir: "C:\\Users\\like\\OneDrive\\oghma_projects"
  # On WSL: scp OneDrive/oghma_projects → database/og/oghma_projects (faster than /mnt/c)
  remote_via_windows: true
  windows_ssh:
    host: auto          # cmd.exe ipconfig: prefer vEthernet (WSL) IPv4
    user: like

freesnell:
  scm: /home/like/repos/freesnell-install/bin/scm
  rwb: /home/like/repos/freesnell-build/FreeSnell/nk.rwb

virtuallab:
  # Windows path; WSL mount (/mnt/c/...) is derived automatically
  virtuallab_dir: "C:\\Program Files\\Wyrowski Photonics\\VirtualLab Fusion (7.5.0) Trial"
  # On WSL: auto scp ps1 → Windows CSV → WSL staging → YAML (set false to use csv_source only)
  remote_via_windows: true
  windows_ssh:
    host: auto          # cmd.exe ipconfig: prefer vEthernet (WSL) IPv4
    user: like
    remote_dir: /c/Users/like/AppData/Local/Temp/virtuallab_export
  # Fallback: csv_export from export_via_windows.sh (meta.json + optional CSV tables)
  csv_source: vl/csv_export/materials
  index_csv: vl/csv_export/materials_export/index.csv

refractive_index_info:
  sha: a66ef8805cdb200973fc7ae9181587e1d89d14eb

granfilm:
  download_url: https://web.phys.ntnu.no/~ingves/Software/GranFilm/Current/Download/Dielectric.tgz
  # Optional: use local GranFilm tree when Dielectric/ exists (skipped when force=true)
  granfilm_dir: /home/like/repos/GranFilm-v1.0
  force: false
